  <style>
  * { font-family: 'Fredoka', sans-serif; }
  html, body { height: 100%; margin: 0; }
  
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
  @media(min-width:768px) { .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
  
  .set-card {
    border-radius: 18px; padding: 20px 10px; text-align: center; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;
  }
  .set-card:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 12px 30px rgba(0,0,0,0.18); }
  
  .quiz-container { display: flex; flex-direction: column; height: 100%; }
  .quiz-progress { padding: 16px; background: rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 16px; }
  .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: #10b981; border-radius: 4px; transition: width 0.3s; }
  
  .quiz-question { padding: 24px; background: rgba(255,255,255,0.95); border-radius: 16px; margin-bottom: 16px; }
  .quiz-question h2 { margin: 0 0 16px 0; font-size: 18px; font-weight: 700; }
  
  .answer-input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 16px; margin-bottom: 12px; }
  .answer-input:focus { outline: none; border-color: #3b82f6; }
  
  .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
  .btn-secondary { background: #6b7280; color: white; }
  .btn-secondary:hover { background: #4b5563; }
  
  .result-screen { text-align: center; padding: 40px 20px; }
  .result-screen h1 { font-size: 48px; margin: 0 0 16px 0; }
  .result-screen p { font-size: 20px; margin: 8px 0; }
  .score-display { font-size: 64px; font-weight: 700; margin: 24px 0; }
  
  .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; animation: confetti-fall 3s ease-out forwards; }
  @keyframes confetti-fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
  
  .login-form { max-width: 400px; margin: auto; padding: 40px 20px; text-align: center; }
  .login-form h1 { font-size: 32px; font-weight: 700; color: white; margin-bottom: 8px; }
  .login-form input { width: 100%; padding: 14px 16px; border: none; border-radius: 10px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; }
  
  .report-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
  .report-correct { background: #d1fae5; color: #065f46; }
  .report-wrong { background: #fee2e2; color: #7f1d1d; }

  <script>
  // Timer logic
  let quizTimer = null;
  let timeRemaining = 600; // 10 minutes in seconds

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function startTimer() {
    timeRemaining = 600;
    updateTimerDisplay();
    
    if (quizTimer) clearInterval(quizTimer);
    quizTimer = setInterval(() => {
      timeRemaining--;
      updateTimerDisplay();
      
      if (timeRemaining <= 0) {
        clearInterval(quizTimer);
        autoSubmitQuiz();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const display = document.getElementById('timerDisplay');
    display.textContent = formatTime(timeRemaining);
    
    // Change color when time is running out
    if (timeRemaining <= 60) {
      display.style.background = 'rgba(239, 68, 68, 0.3)';
      display.style.color = '#FCA5A5';
    } else if (timeRemaining <= 180) {
      display.style.background = 'rgba(245, 158, 11, 0.3)';
      display.style.color = '#FCD34D';
    } else {
      display.style.background = 'rgba(0,0,0,0.2)';
      display.style.color = 'white';
    }
  }

  function stopTimer() {
    if (quizTimer) clearInterval(quizTimer);
  }

  function autoSubmitQuiz() {
    showResults();
  }
  </script>

    document.getElementById('currentQuestion').textContent = currentQuestion + 1;

    document.getElementById('progressFill').style.width = progress + '%';
  }

  function submitAnswer() {
    const input = document.getElementById('answerInput').value.trim();
    if (!input) return;
    
    const userAnswer = parseInt(input);
    const correctAnswer = setsData[currentSet][currentQuestion].a;
    const isCorrect = userAnswer === correctAnswer;
    
    userAnswers.push(userAnswer);
    quizResults.push({
      question: setsData[currentSet][currentQuestion].q,
      userAnswer,
      correctAnswer,
      isCorrect
    });
    
    if (currentQuestion < setsData[currentSet].length - 1) {
      currentQuestion++;
      showQuestion();
    } else {
      showResults();
    }
  }

    const percentage = Math.round((correct / total) * 100);
    
    document.getElementById('scoreDisplay').textContent = `${correct}/${total}`;

  function adjustColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + amount));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amount));
    const b = Math.min(255, Math.max(0, (num & 0xff) + amount));
    return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
  }

  function getContrastColor(hex) {
    const num = parseInt(hex.slice(1), 16);
    const r = num >> 16, g = (num >> 8) & 0xff, b = num & 0xff;
    return (r * 299 + g * 587 + b * 114) / 1000 > 150 ? '#2d3436' : '#ffffff';
